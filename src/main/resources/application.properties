# ================================================================
# APPLICATION — Cloud VM Rental
# ================================================================
spring.application.name=cloud-vm-rental

# ================================================================
# SERVER
# ================================================================
server.port=8080

# ================================================================
# SECRETS — Load từ file riêng (không commit lên Git)
# Copy file application-secrets.properties.example
# đổi tên thành application-secrets.properties rồi điền thông tin thật
# ================================================================
spring.config.import=optional:classpath:application-secrets.properties

# ================================================================
# SQL SERVER DATASOURCE
# Credentials được load từ application-secrets.properties
# ================================================================
spring.datasource.url=jdbc:sqlserver://cloudvm-db.c3km8wawc7gx.ap-southeast-1.rds.amazonaws.com:1433;databaseName=CloudVmDB;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ================================================================
# JPA / HIBERNATE
# validate: kiểm tra schema khớp với entity, không tự sửa DB
# ================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Dialect không cần khai báo — Hibernate 6 tự detect SQL Server
# Dùng tên bảng chính xác như trong @Table(name="..."), không tự convert sang snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================================================================
# JWT
# jwt.secret và jwt.expiration-ms được load từ application-secrets.properties
# ================================================================
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

app.base-url=http://localhost:8080
app.auth.verification-expiration-minutes=60
app.auth.reset-expiration-minutes=30

# ================================================================
# AWS
# Credentials được đọc tự động từ:
#   1. Env vars: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   2. File: ~/.aws/credentials  (khuyến nghị)
# aws.ec2.securityGroupId và aws.ec2.subnetId trong application-secrets.properties
# ================================================================
#// Vùng AWS (ví dụ: us-east-1, ap-southeast-1)
aws.region=ap-southeast-1
aws.iam.instanceProfileName=EC2-SSM-Role
aws.s3.bucketName=cloudvm-user-avatars

# ================================================================
# ASYNC THREAD POOL
# ================================================================
async.pool.coreSize=5
async.pool.maxSize=20
async.pool.queueCapacity=100

# ================================================================
# LOGGING
# ================================================================
logging.level.com.cloudvm=DEBUG
logging.level.software.amazon.awssdk=WARN
